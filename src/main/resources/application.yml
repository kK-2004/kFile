oss:
  type: ali
  prefix: k-File
  endpoint: oss-cn-beijing.aliyuncs.com
  internalEndpoint: oss-cn-beijing-internal.aliyuncs.com
  ak: ${OSS_AK}
  sk: ${OSS_SK}
  bucket: oss-kk
  host: https://oss-kk.oss-cn-beijing.aliyuncs.com/

# MinIO 数据源（可选，默认禁用；启用时通过 MINIO_* 环境变量注入）
minio:
  enabled: ${MINIO_ENABLED:false}
  endpoint: ${MINIO_ENDPOINT:}
  accessKey: ${MINIO_ACCESS_KEY:}
  secretKey: ${MINIO_SECRET_KEY:}
  bucket: ${MINIO_BUCKET:k-file}
  prefix: ${MINIO_PREFIX:}
  presignedDirect: ${MINIO_PRESIGNED_DIRECT:true}

spring:
  profiles:
    active: dev
  config:
    import: application-${spring.profiles.active}.yml
  ai:
    mcp:
      server:
        name: kfile-mcp-server
        version: 1.0.0
        # SSE 传输：由 spring-ai-starter-mcp-server-webmvc 自动启用（1.0.x 无 protocol 属性）。
        # 端点：SSE 连接 /mcp/sse，消息收发 /mcp/messages（均由 McpTokenAuthFilter 鉴权）。
        sse-endpoint: /mcp/sse
        sse-message-endpoint: /mcp/messages
        # 同步服务器，仅注册同步 @Tool 方法
        type: SYNC

geoip:
  enabled: ${GEOIP_ENABLED:false}
  mmdbPath: ${GEOIP_MMDB_PATH:}

# MCP 长期令牌有效期（默认 6 个月），可通过环境变量覆盖
app:
  mcp:
    token-validity: P182D
  kmessage:
    enabled: ${KMESSAGE_ENABLED:true}
    endpoint: ${KMESSAGE_ENDPOINT:https://message.ksite.xin}
    app-key: ${KMESSAGE_APP_KEY:app_SLeiC8yZdbX7KU2b}
    app-secret: ${KMESSAGE_APP_SECRET:}

xxl:
  job:
    enabled: ${XXL_JOB_ENABLED:true}
    admin:
      addresses: ${XXL_JOB_ADMIN_ADDR:http://127.0.0.1:8080/xxl-job-admin}
      username: ${XXL_JOB_ADMIN_USER:admin}
      password: ${XXL_JOB_ADMIN_PWD:}
    accessToken: ${XXL_JOB_ACCESS_TOKEN:}
    executor:
      appname: ${XXL_JOB_APPNAME:kfile-executor}
      address:
      ip:
      # 执行器端口：留空（默认）= 自动选可用端口，避免本机多实例/调试时端口冲突
      port: ${XXL_JOB_EXECUTOR_PORT:}
      logpath: ${XXL_JOB_LOGPATH:/data/applogs/xxl-job/jobhandler}
      logretentiondays: 30
      job-group: ${XXL_JOB_JOB_GROUP:2}
