server:
  port: 9000
  tomcat:
    max-swallow-size: -1
    max-http-form-post-size: -1

env:
  name: dev
  cors: http://localhost:5174

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/k_file?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: kfile
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 2048MB
      max-request-size: 2048MB

geoip:
  enabled: ${GEOIP_ENABLED:false}
  mmdbPath: ${GEOIP_MMDB_PATH:}

oss:
  type: ali

app:
  project:
    monthly-limit:
      user: 3
