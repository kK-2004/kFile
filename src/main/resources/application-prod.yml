env:
  name: prod
  cors: https://ksite.xin

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/k_file?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC
    username: kfile
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 2048MB
      max-request-size: 2048MB
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://ksite.xin/auth

server:
  tomcat:
    max-swallow-size: -1
    max-http-form-post-size: -1
  port: 8086

# App-level settings
app:
  base-path: /kfile
  sso:
    enabled: true
    jwt:
      # 主站不可用时的重试间隔（秒）；间隔内不会反复请求 /.well-known/openid-configuration
      init-retry-seconds: 30
  project:
    monthly-limit:
      user: 3

geoip:
  enabled: ${GEOIP_ENABLED:false}
  mmdbPath: ${GEOIP_MMDB_PATH:}

site:
  base-url: ${KSITE_BASE_URL:https://ksite.xin}
