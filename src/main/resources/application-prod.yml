env:
  name: prod
  # 支持环境变量覆盖：test 环境由 CI 注入 ENV_CORS=https://test-file.ksite.xin
  cors: ${ENV_CORS:https://file.ksite.xin}

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/k_file?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 2048MB
      max-request-size: 2048MB

server:
  tomcat:
    max-swallow-size: -1
    max-http-form-post-size: -1
  port: 8081

app:
  project:
    monthly-limit:
      user: 3

geoip:
  enabled: ${GEOIP_ENABLED:false}
  mmdbPath: ${GEOIP_MMDB_PATH:}

# MinIO：prod 环境留空占位，需启用时通过 MINIO_* 环境变量注入
minio:
  enabled: ${MINIO_ENABLED:false}
