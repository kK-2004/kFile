server:
  port: 8086

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://mysql:3306/k_file?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:kfile}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

# 其余业务配置沿用默认 application.yml；如需覆盖可在此追加
oss:
  type: ali

geoip:
  enabled: ${GEOIP_ENABLED:false}
  mmdbPath: ${GEOIP_MMDB_PATH:}

cors:
  allowed-origins: https://ksite.xin

